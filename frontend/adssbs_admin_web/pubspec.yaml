name: adssbs_admin_web
description: "Admin Web for ADSSBS Feedback System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # HTTP & Networking
  http: ^1.2.1
  
  # State & Storage
  shared_preferences: ^2.3.2
  flutter_dotenv: ^5.1.0      # ✅ Fixed: Stable version
  
  # UI & Charts
  fl_chart: ^0.68.0           # ✅ Stable
  intl: ^0.19.0
  
  # Customization
  flutter_colorpicker: ^1.0.3 # ✅ Your original working version
  
  # Utils (optional)
  uuid: ^4.4.2                # ✅ Stable

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0       # ✅ Stable lints
  test: ^1.25.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/loginbackground.jpg
    - assets/images/loginlogo.png